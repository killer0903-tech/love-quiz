<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Quiz for My Love ❤️</title>
<div class="progress">
<div id="progressBar"></div>
</div>
<style>
.progress{
width:100%;
background:#eee;
border-radius:10px;
margin:10px 0;
height:10px;
}

#progressBar{
height:10px;
background:#ff6b81;
width:0%;
border-radius:10px;
}
body{
font-family: Arial;
text-align:center;
background: linear-gradient(#ff9a9e,#fad0c4);
padding:20px;
}

.container{
background:white;
padding:25px;
border-radius:15px;
max-width:400px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
display:block;
width:100%;
margin:8px 0;
padding:12px;
border:none;
border-radius:8px;
background:#ff6b81;
color:white;
font-size:16px;
}

button:hover{
background:#ff4757;
}

#result{
font-size:20px;
margin-top:10px;
}
  .heart{
position:fixed;
top:-10px;
font-size:24px;
animation:fall 3s linear forwards;
}

@keyframes fall{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}
.welcome{
text-align:center;
margin-top:120px;
}

.startBtn{
padding:15px 30px;
font-size:18px;
background:#ff6b81;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.startBtn:hover{
background:#ff4757;
}
</style>
</head>

<body>
  <div id="welcomeScreen" class="welcome">
<h1>Welcome ❤️</h1>
<p>This quiz is made for you to practice and succeed in your exam 🌟</p>

<button onclick="startQuiz()" class="startBtn">
Start Quiz ❤️
</button>
</div>

<div class="container" id="quizBox" style="display:none;">

<h2>Study Quiz ❤️</h2>

<p id="question"></p>

<div id="options"></div>

<h3 id="result"></h3>
<h4 id="score">Score: 0 ❤️</h4>
<h4 id="timer">Time: 10s</h4>
</div>

<script>
  function startQuiz(){

document.getElementById("welcomeScreen").style.display="none"

document.getElementById("quizBox").style.display="block"

}

let questions = [

{
q:"Which enzyme is responsible for the digestion of proteins in the stomach? (NEET 2020)",
options:["Trypsin","Pepsin","Chymotrypsin","Carboxypeptidase"],
answer:"Pepsin"
},

{
q:"The hormone that stimulates the secretion of pancreatic juice is: (NEET 2019)",
options:["Gastrin","Secretin","Insulin","Adrenaline"],
answer:"Secretin"
},

{
q:"Oxygen is transported in human blood mainly as: (NEET 2021)",
options:["Oxyhemoglobin","Dissolved oxygen","Carbaminohemoglobin","Carbonic acid"],
answer:"Oxyhemoglobin"
},

{
q:"Which of the following is the respiratory center in the brain? (NEET 2018)",
options:["Cerebellum","Medulla oblongata","Hypothalamus","Cerebrum"],
answer:"Medulla oblongata"
},

{
q:"The pacemaker of the human heart is: (NEET 2020)",
options:["AV node","SA node","Purkinje fibers","Bundle of His"],
answer:"SA node"
},

{
q:"Which blood vessel carries oxygenated blood from lungs to heart? (NEET 2017)",
options:["Pulmonary artery","Pulmonary vein","Aorta","Vena cava"],
answer:"Pulmonary vein"
},

{
q:"The filtration of blood in the kidney occurs in: (NEET 2019)",
options:["Loop of Henle","Glomerulus","Collecting duct","Distal tubule"],
answer:"Glomerulus"
},

{
q:"The counter current mechanism in kidneys helps in: (NEET 2018)",
options:["Formation of urine","Concentration of urine","Filtration of blood","Absorption of glucose"],
answer:"Concentration of urine"
},

{
q:"The part of the brain responsible for maintaining posture and balance is: (NEET 2021)",
options:["Cerebrum","Cerebellum","Medulla","Thalamus"],
answer:"Cerebellum"
},

{
q:"Which hormone regulates blood sugar level? (NEET 2017)",
options:["Thyroxine","Insulin","Adrenaline","Cortisol"],
answer:"Insulin"
}

]

let current = 0
let score = 0
let time = 10
let timer

loadQuestion()

function loadQuestion(){

let q = questions[current]

let progress = ((current+1)/questions.length)*100
document.getElementById("progressBar").style.width = progress + "%"

document.getElementById("question").innerHTML = q.q

let optionsHTML=""

q.options.forEach(option => {

optionsHTML += `<button onclick="checkAnswer('${option}')">${option}</button>`

})

document.getElementById("options").innerHTML = optionsHTML

clearInterval(timer)
startTimer()

}

function checkAnswer(answer){

let correct = questions[current].answer

let message=""

if(answer === correct){

score++
message = "Correct 😘❤️ Proud of you!"

/* trigger heart animation */
for(let i=0;i<10;i++){
createHeart()
}

}

else{

message = "Wrong ❌ Correct answer is: " + correct + " 💡 You can do it!"

}

document.getElementById("result").innerHTML = message

document.getElementById("score").innerHTML =
"Score: "+score+" ❤️"

/* disable buttons after answering */
let buttons = document.querySelectorAll("#options button")
buttons.forEach(btn => btn.disabled = true)

current++

setTimeout(function(){

document.getElementById("result").innerHTML=""

if(current < questions.length){

loadQuestion()

}
else{

document.getElementById("question").innerHTML = "Quiz Finished 🎉"

if(score >= 5){

document.getElementById("result").innerHTML =
"You did amazing 😘❤️"

}else{

document.getElementById("result").innerHTML =
"Keep practicing ❤️"

}

document.getElementById("options").innerHTML=""

}

},3000)

}
  function createHeart(){

let heart = document.createElement("div")

heart.classList.add("heart")

heart.innerHTML = "❤️"

heart.style.left = Math.random()*100 + "vw"

document.body.appendChild(heart)

setTimeout(function(){
heart.remove()
},3000)

}function startTimer(){

time = 10

timer = setInterval(function(){

document.getElementById("timer").innerHTML =
"Time: " + time + "s"

time--

if(time < 0){

clearInterval(timer)

document.getElementById("result").innerHTML =
"Time up ⏱"

current++

loadQuestion()

}

},1000)

}
</script>

</body>
</html>
