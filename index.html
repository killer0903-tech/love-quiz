<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Quiz for My Love ❤️</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(#ff9a9e,#fad0c4);
padding:20px;
}

.container{
background:white;
padding:25px;
border-radius:15px;
max-width:400px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.progress{
width:100%;
background:#eee;
border-radius:10px;
margin:10px 0;
height:10px;
}

#progressBar{
height:10px;
background:#ff6b81;
width:0%;
border-radius:10px;
}

button{
display:block;
width:100%;
margin:8px 0;
padding:12px;
border:none;
border-radius:8px;
background:#ff6b81;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff4757;
}

.welcome{
text-align:center;
margin-top:120px;
}

.startBtn{
padding:15px 30px;
font-size:18px;
background:#ff6b81;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.heart{
position:fixed;
top:-10px;
font-size:24px;
animation:fall 3s linear forwards;
}

@keyframes fall{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(100vh);opacity:0;}
}

.confetti{
position:fixed;
top:-10px;
width:10px;
height:10px;
animation:confettiFall 3s linear forwards;
}

@keyframes confettiFall{
0%{transform:translateY(0) rotate(0deg);opacity:1;}
100%{transform:translateY(100vh) rotate(720deg);opacity:0;}
}
#navPanel{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:5px;
margin:15px 0;
}

.navBtn{
padding:6px;
font-size:12px;
background:#ddd;
border-radius:5px;
border:none;
cursor:pointer;
}

.navBtn.current{
background:#ff6b81;
color:white;
}

.navBtn.answered{
background:#2ed573;
color:white;
}
</style>
</head>

<body>

<div id="welcomeScreen" class="welcome">
<h1>Welcome ❤️</h1>

<p>
You have <b>60 questions</b>.<br>
Score <b>55 or more</b> to unlock your surprise gift 🎁
</p>

<p>I believe in you. Good luck! 🌟</p>

<button onclick="startQuiz()" class="startBtn">Start Quiz ❤️</button>
</div>

<div class="container" id="quizBox" style="display:none;">

<h2>Study Quiz ❤️</h2>

<div class="progress">
<div id="progressBar"></div>
</div>
<div id="navPanel"></div>
<h4 id="questionNumber"></h4>
<p id="question"></p>

<div id="options"></div>

<h3 id="result"></h3>

<h4 id="score">Score: 0 ❤️</h4>

<h4 id="timer">Time: 20s</h4>

</div>

<div id="finalScreen" style="display:none; text-align:center; margin-top:120px;">

<h1>Quiz Finished ❤️</h1>

<p id="finalMessage"></p>

<div id="giftBox" style="font-size:80px;margin:20px;">
🔒🎁
</div>

<h2 id="giftMessage"></h2>

</div>

<audio id="correctSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="giftSound" src="https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg"></audio>

<script>

let questions = [
{
q:"The correct sequence of taxonomic hierarchy is:",
options:["Kingdom → Class → Order → Phylum → Family","Kingdom → Phylum → Class → Order → Family → Genus → Species","Kingdom → Order → Phylum → Class","Species → Genus → Family → Kingdom"],
answer:"Kingdom → Phylum → Class → Order → Family → Genus → Species"
},

{
q:"The five-kingdom classification was proposed by:",
options:["Carl Linnaeus","R.H. Whittaker","Ernst Haeckel","Bentham & Hooker"],
answer:"R.H. Whittaker"
},

{
q:"Lichens represent:",
options:["Symbiosis between algae and fungi","Symbiosis between bacteria and fungi","Parasitic association","Symbiosis between algae and bryophytes"],
answer:"Symbiosis between algae and fungi"
},

{
q:"Which kingdom includes organisms with chitin cell walls?",
options:["Monera","Protista","Fungi","Plantae"],
answer:"Fungi"
},

{
q:"Viruses differ from living organisms because they:",
options:["Contain nucleic acids","Can reproduce","Lack cellular structure","Contain proteins"],
answer:"Lack cellular structure"
},

{
q:"The arrangement of vascular bundles in dicot stem is:",
options:["Scattered","Ring","Radial","Collateral closed"],
answer:"Ring"
},

{
q:"Which tissue is responsible for secondary growth in plants?",
options:["Apical meristem","Intercalary meristem","Lateral meristem","Parenchyma"],
answer:"Lateral meristem"
},

{
q:"The fruit develops from:",
options:["Ovary","Ovule","Embryo sac","Endosperm"],
answer:"Ovary"
},

{
q:"The exoskeleton of insects is made of:",
options:["Cellulose","Keratin","Chitin","Collagen"],
answer:"Chitin"
},

{
q:"The functional unit of nervous tissue is:",
options:["Axon","Neuron","Synapse","Dendrite"],
answer:"Neuron"
},

{
q:"The fluid mosaic model of plasma membrane was proposed by:",
options:["Watson & Crick","Singer & Nicolson","Robertson","Schleiden"],
answer:"Singer & Nicolson"
},

{
q:"Which organelle is known as the powerhouse of the cell?",
options:["Golgi body","Mitochondria","Lysosome","Ribosome"],
answer:"Mitochondria"
},

{
q:"The site of protein synthesis is:",
options:["Lysosome","Ribosome","Golgi apparatus","Vacuole"],
answer:"Ribosome"
},

{
q:"Crossing over occurs during which stage of meiosis?",
options:["Prophase I","Metaphase I","Anaphase I","Telophase I"],
answer:"Prophase I"
},

{
q:"The number of chromosomes in human gametes is:",
options:["23","46","44","22"],
answer:"23"
},

{
q:"The primary CO₂ acceptor in C₄ plants is:",
options:["RuBP","PEP","OAA","PGA"],
answer:"PEP"
},

{
q:"Photorespiration occurs in:",
options:["C3 plants","C4 plants","CAM plants","Algae"],
answer:"C3 plants"
},

{
q:"The enzyme involved in CO₂ fixation in Calvin cycle is:",
options:["RuBisCO","ATP synthase","NADH dehydrogenase","PEP carboxylase"],
answer:"RuBisCO"
},

{
q:"Glycolysis occurs in:",
options:["Mitochondria","Cytoplasm","Chloroplast","Nucleus"],
answer:"Cytoplasm"
},

{
q:"Ethylene is responsible for:",
options:["Seed dormancy","Fruit ripening","Root growth","Cell division"],
answer:"Fruit ripening"
},

{
q:"Oxygen binds to hemoglobin in:",
options:["Tissues","Lungs","Heart","Kidneys"],
answer:"Lungs"
},

{
q:"The pacemaker of the heart is:",
options:["AV node","SA node","Bundle of His","Purkinje fibers"],
answer:"SA node"
},

{
q:"The functional unit of kidney is:",
options:["Neuron","Nephron","Glomerulus","Loop of Henle"],
answer:"Nephron"
},

{
q:"ADH hormone controls:",
options:["Blood pressure","Water reabsorption","Heart rate","Glucose level"],
answer:"Water reabsorption"
},

{
q:"The hormone responsible for fight-or-flight response is:",
options:["Insulin","Adrenaline","Thyroxine","Cortisol"],
answer:"Adrenaline"
},

{
q:"Double fertilization occurs in:",
options:["Gymnosperms","Angiosperms","Bryophytes","Pteridophytes"],
answer:"Angiosperms"
},

{
q:"Male gametophyte in flowering plants is:",
options:["Ovule","Pollen grain","Embryo","Endosperm"],
answer:"Pollen grain"
},

{
q:"The site of fertilization in humans is:",
options:["Uterus","Ovary","Fallopian tube","Cervix"],
answer:"Fallopian tube"
},

{
q:"IVF stands for:",
options:["Internal fertilization","In vitro fertilization","In vivo fertilization","Artificial fertilization"],
answer:"In vitro fertilization"
},

{
q:"The hormone responsible for milk secretion is:",
options:["Oxytocin","Prolactin","Estrogen","Progesterone"],
answer:"Prolactin"
},

{
q:"The law of segregation was proposed by:",
options:["Mendel","Morgan","Darwin","Watson"],
answer:"Mendel"
},

{
q:"DNA replication occurs in:",
options:["S phase","G1 phase","M phase","G2 phase"],
answer:"S phase"
},

{
q:"The genetic material of most viruses is:",
options:["RNA","DNA","Both","Protein"],
answer:"RNA"
},

{
q:"The codon for start of translation is:",
options:["UAA","AUG","UGA","UAG"],
answer:"AUG"
},

{
q:"Colour blindness is:",
options:["Autosomal disorder","Sex-linked disorder","Dominant disorder","Polygenic disorder"],
answer:"Sex-linked disorder"
},

{
q:"Malaria is caused by:",
options:["Virus","Bacteria","Protozoa","Fungus"],
answer:"Protozoa"
},

{
q:"The vector of malaria is:",
options:["Culex mosquito","Aedes mosquito","Female Anopheles mosquito","Housefly"],
answer:"Female Anopheles mosquito"
},

{
q:"AIDS is caused by:",
options:["Bacteria","Virus","Fungus","Protozoa"],
answer:"Virus"
},

{
q:"Penicillin is produced by:",
options:["Bacteria","Fungi","Algae","Virus"],
answer:"Fungi"
},

{
q:"Biofertilizers contain:",
options:["Chemical nutrients","Living microorganisms","Hormones","Pesticides"],
answer:"Living microorganisms"
}
,
{
q:"The enzyme responsible for DNA synthesis during replication is:",
options:["RNA polymerase","DNA ligase","DNA polymerase","Helicase"],
answer:"DNA polymerase"
},

{
q:"The approximate number of base pairs in the human genome is:",
options:["3 million","3 billion","30 million","30 billion"],
answer:"3 billion"
},

{
q:"Which hormone lowers blood glucose level?",
options:["Glucagon","Insulin","Adrenaline","Cortisol"],
answer:"Insulin"
},

{
q:"Universal donor blood group is:",
options:["A","B","AB","O"],
answer:"O"
},

{
q:"Universal recipient blood group is:",
options:["O","A","B","AB"],
answer:"AB"
},

{
q:"The normal resting heart rate of an adult human is about:",
options:["50 beats/min","60 beats/min","72 beats/min","100 beats/min"],
answer:"72 beats/min"
},

{
q:"The energy currency of the cell is:",
options:["NADH","FADH₂","ATP","GTP"],
answer:"ATP"
},

{
q:"Which plant hormone promotes cell division?",
options:["Auxin","Cytokinin","Gibberellin","Abscisic acid"],
answer:"Cytokinin"
},

{
q:"Formation of sperm in males is called:",
options:["Oogenesis","Gametogenesis","Spermatogenesis","Fertilization"],
answer:"Spermatogenesis"
},

{
q:"The enzyme that joins Okazaki fragments during DNA replication is:",
options:["DNA polymerase","DNA ligase","Helicase","Primase"],
answer:"DNA ligase"
},

{
q:"The enzyme responsible for RNA synthesis during transcription is:",
options:["DNA polymerase","RNA polymerase","Ligase","Topoisomerase"],
answer:"RNA polymerase"
},

{
q:"The hormone that regulates calcium level in blood is:",
options:["Thyroxine","Parathyroid hormone","Insulin","Cortisol"],
answer:"Parathyroid hormone"
},

{
q:"Maximum ATP during cellular respiration is produced in:",
options:["Glycolysis","Krebs cycle","Electron transport chain","Fermentation"],
answer:"Electron transport chain"
},

{ 
q:"The organelle known as the suicide bags of the cell is:",
options:["Mitochondria","Lysosome","Golgi apparatus","Ribosome"],
answer:"Lysosome"
},

{
q:"Diabetes mellitus is caused by deficiency of:",
options:["Thyroxine","Insulin","Glucagon","Adrenaline"],
answer:"Insulin"
},

{
q:"Chromosomes align at the equatorial plate during:",
options:["Prophase","Metaphase","Anaphase","Telophase"],
answer:"Metaphase"
},

{
q:"The RNA molecule that carries amino acids to ribosome is:",
options:["mRNA","rRNA","tRNA","snRNA"],
answer:"tRNA"
},

{
q:"The genetic code is:",
options:["Non-degenerate","Degenerate","Non-universal","Overlapping"],
answer:"Degenerate"
},

{
q:"The first antibiotic discovered was:",
options:["Streptomycin","Penicillin","Tetracycline","Chloramphenicol"],
answer:"Penicillin"
},

{
q:"The concept of survival of the fittest was given by:",
options:["Mendel","Darwin","Lamarck","Morgan"],
answer:"Darwin"
}
]

let current = 0
let score = 0
let time = 20
let timer

function startQuiz(){

document.getElementById("welcomeScreen").style.display="none"
document.getElementById("quizBox").style.display="block"
createNavPanel()
loadQuestion()

}

function loadQuestion(){

let q = questions[current]

document.getElementById("questionNumber").innerHTML =
"Question " + (current+1) + " / " + questions.length

document.getElementById("progressBar").style.width =
((current+1)/questions.length)*100 + "%"

document.getElementById("question").innerHTML = q.q

let optionsHTML=""

q.options.forEach(option=>{
optionsHTML += `<button onclick="checkAnswer('${option}')">${option}</button>`
})

document.getElementById("options").innerHTML = optionsHTML

clearInterval(timer)
startTimer()
updateNavPanel()

}
let wrongMessages = [
"Keep going ❤️",
"I believe in you!",
"You can do it 💪",
"Almost there!",
"Don't give up 🌟"
]

let loveMessages = [
"Proud of you ❤️",
"You are amazing 😘",
"My future doctor 👩‍⚕️",
"You make me proud 💖",
"You're doing great!"
]
function checkAnswer(answer){

let correct = questions[current].answer

if(answer===correct){

score++
if(score % 5 === 0){

let loveMsg = loveMessages[Math.floor(Math.random()*loveMessages.length)]

document.getElementById("result").innerHTML =
"Correct 😘❤️<br>" + loveMsg

}
document.getElementById("result").innerHTML="Correct 😘❤️ Proud of you!"

let s=document.getElementById("correctSound")
s.currentTime=0
s.play()

for(let i=0;i<10;i++){createHeart()}

}else{

let randomMsg = wrongMessages[Math.floor(Math.random()*wrongMessages.length)]

document.getElementById("result").innerHTML =
"Wrong ❌ Correct answer is: " + correct + "<br>" + randomMsg
}

document.getElementById("score").innerHTML="Score: "+score+" ❤️"

document.querySelectorAll("#options button").forEach(b=>b.disabled=true)

setTimeout(nextQuestion,1500)

}

function nextQuestion(){
document.querySelectorAll(".navBtn")[current].classList.add("answered")
current++

if(current < questions.length){

loadQuestion()

}else{

showFinal()

}

}

function showFinal(){

document.getElementById("quizBox").style.display="none"
document.getElementById("finalScreen").style.display="block"

document.getElementById("finalMessage").innerHTML =
"Your score is "+score+" ❤️ out of "+questions.length

if(score>=55){

document.getElementById("giftBox").innerHTML="🎁"
document.getElementById("giftMessage").innerHTML="🎉 Gift unlocked!"

let g=document.getElementById("giftSound")
g.currentTime=0
g.play()

for(let i=0;i<80;i++){createConfetti()}
for(let i=0;i<40;i++){createHeart()}

}else{

document.getElementById("giftMessage").innerHTML="🔒 Score 55 to unlock your gift ❤️"

}

}

function startTimer(){

time=20

timer=setInterval(()=>{

document.getElementById("timer").innerHTML="Time: "+time+"s"

time--

if(time<0){

clearInterval(timer)

document.getElementById("result").innerHTML="Time up ⏱"

setTimeout(nextQuestion,1000)

}

},1000)

}

function createHeart(){

let heart=document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),3000)

}

function createConfetti(){

let colors=["red","yellow","blue","green","pink","purple"]

let conf=document.createElement("div")

conf.classList.add("confetti")

conf.style.background=colors[Math.floor(Math.random()*colors.length)]

conf.style.left=Math.random()*100+"vw"

document.body.appendChild(conf)

setTimeout(()=>conf.remove(),3000)

}
function createNavPanel(){

let navHTML=""

for(let i=0;i<questions.length;i++){

navHTML += `<button class="navBtn" onclick="goToQuestion(${i})">${i+1}</button>`

}

document.getElementById("navPanel").innerHTML = navHTML

}
function goToQuestion(index){

current = index

loadQuestion()

}
function updateNavPanel(){

let buttons = document.querySelectorAll(".navBtn")

buttons.forEach(btn => btn.classList.remove("current"))

buttons[current].classList.add("current")

}

</script>

</body>
</html>
